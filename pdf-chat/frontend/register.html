<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Account — InsightDocs AI</title>
<meta name="description" content="Create your InsightDocs AI account — RAG-Powered Multi-Document Knowledge Assistant"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="auth-style.css"/>
<script src="auth-helper.js"></script>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">✦</div>
    <div>
      <div class="logo-text">InsightDocs AI</div>
      <div class="logo-tag">RAG-Powered Knowledge Assistant</div>
    </div>
  </div>

  <h1>Create your account</h1>
  <p class="sub">Start chatting with your PDFs in seconds — free forever</p>

  <div class="features">
    <div class="feat"><span>✓</span> AI-powered chat</div>
    <div class="feat"><span>✓</span> Cloud sessions</div>
    <div class="feat"><span>✓</span> Saved favorites</div>
    <div class="feat"><span>✓</span> Multi-language</div>
  </div>

  <div class="msg-box hidden" id="msg-box"></div>

  <form id="register-form" onsubmit="handleRegister(event)" novalidate>
    <div class="form-group">
      <label for="name">Full name</label>
      <div class="input-wrap">
        <input type="text" id="name" placeholder="Your full name" autocomplete="name" required/>
        <span class="input-icon" id="name-icon">👤</span>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email address</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required/>
        <span class="input-icon" id="email-icon">📧</span>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" oninput="checkStrength(this.value)" required/>
        <button type="button" class="eye-btn" onclick="togglePwd('password',this)">👁</button>
      </div>
      <div class="strength-wrap" id="strength-wrap" style="display:none">
        <div class="strength-bars">
          <div class="s-bar" id="s1"></div>
          <div class="s-bar" id="s2"></div>
          <div class="s-bar" id="s3"></div>
          <div class="s-bar" id="s4"></div>
        </div>
        <div class="strength-label" id="s-label"></div>
      </div>
    </div>

    <div class="form-group">
      <label for="confirm">Confirm password</label>
      <div class="input-wrap">
        <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password" oninput="checkMatch()" required/>
        <button type="button" class="eye-btn" onclick="togglePwd('confirm',this)">👁</button>
      </div>
      <div class="help" id="match-hint"></div>
    </div>

    <label class="terms-label">
      <input type="checkbox" id="terms" required/>
      I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
    </label>

    <button class="btn" type="submit" id="submit-btn">
      <div class="spinner"></div>
      <span class="btn-text">Create Account →</span>
    </button>
  </form>

  <div class="divider">or</div>

  <div class="footer-link">
    Already have an account? <a href="login.html">Sign in</a>
  </div>
</div>

<script>
function checkStrength(val) {
  const wrap = document.getElementById('strength-wrap');
  const label = document.getElementById('s-label');
  wrap.style.display = val ? 'block' : 'none';
  if (!val) return;
  let score = 0;
  if (val.length >= 6) score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
  if (/[0-9!@#$%^&*]/.test(val)) score++;
  const colors = ['#f87171','#fb923c','#fbbf24','#34d399'];
  const labels = ['Weak','Fair','Good','Strong'];
  const labColors = ['#f87171','#fb923c','#fbbf24','#34d399'];
  for (let i=1;i<=4;i++) {
    document.getElementById('s'+i).style.background = i <= score ? colors[score-1] : 'rgba(99,120,180,.15)';
  }
  label.textContent = labels[score-1] || '';
  label.style.color = labColors[score-1] || 'transparent';
}

function checkMatch() {
  const p = document.getElementById('password').value;
  const c = document.getElementById('confirm').value;
  const hint = document.getElementById('match-hint');
  if (!c) { hint.textContent=''; return; }
  if (p === c) { hint.textContent = '✓ Passwords match'; hint.style.color = '#34d399'; }
  else { hint.textContent = '✗ Passwords do not match'; hint.style.color = '#f87171'; }
}

async function handleRegister(e) {
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const terms = document.getElementById('terms').checked;
  const btn = document.getElementById('submit-btn');

  if (!name) { showMsg('Please enter your full name.', 'error'); return; }
  if (!email) { showMsg('Please enter your email address.', 'error'); return; }
  if (password.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }
  if (password !== confirm) { showMsg('Passwords do not match.', 'error'); return; }
  if (!terms) { showMsg('Please agree to the Terms of Service.', 'error'); return; }

  btn.classList.add('loading'); btn.disabled = true;
  document.getElementById('msg-box').style.display = 'none';

  try {
    const res = await fetch('/api/auth?action=register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();

    if (res.status === 409 && data.needsVerification) {
      showMsg('This email is registered but not verified. Redirecting to verification…', 'info');
      sessionStorage.setItem('pendingEmail', data.email || email.toLowerCase().trim());
      const emailSent = data.emailSent !== false;
      setTimeout(() => window.location.href = `verify-otp.html?email=${encodeURIComponent(data.email || email)}&action=register&emailSent=${emailSent}`, 1200);
      return;
    }

    if (!res.ok) { showMsg(data.error || 'Registration failed.', 'error'); return; }

    const pendingEmail = data.email || email.toLowerCase().trim();
    sessionStorage.setItem('pendingEmail', pendingEmail);
    const emailSent = data.emailSent !== false;
    showMsg('Account created! Check your email (and Spam folder) for a verification code…', 'success');
    setTimeout(() => window.location.href = `verify-otp.html?email=${encodeURIComponent(pendingEmail)}&action=register&emailSent=${emailSent}`, 1000);

  } catch (err) {
    showMsg('Network error. Please try again.', 'error');
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}
</script>
</body>
</html>
