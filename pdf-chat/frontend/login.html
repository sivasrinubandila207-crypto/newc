<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — InsightDocs AI</title>
<meta name="description" content="Sign in to InsightDocs AI — RAG-Powered Multi-Document Knowledge Assistant"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="auth-style.css"/>
<script src="auth-helper.js"></script>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">✦</div>
    <div>
      <div class="logo-text">InsightDocs AI</div>
      <div class="logo-tag">RAG-Powered Knowledge Assistant</div>
    </div>
  </div>

  <h1>Welcome back</h1>
  <p class="sub">Sign in to access your documents and chat history</p>

  <div class="msg-box hidden" id="msg-box"></div>

  <form id="login-form" onsubmit="handleLogin(event)" novalidate>
    <div class="form-group">
      <label for="email">Email address</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required/>
        <span class="input-icon">📧</span>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required/>
        <button type="button" class="eye-btn" onclick="togglePwd('password',this)" id="eye-btn">👁</button>
      </div>
    </div>

    <div class="row-between">
      <label class="check-label">
        <input type="checkbox" id="remember"/>
        Remember me
      </label>
      <a href="forgot-password.html" class="forgot">Forgot password?</a>
    </div>

    <button class="btn" type="submit" id="submit-btn">
      <div class="spinner"></div>
      <span class="btn-text">Sign In →</span>
    </button>
  </form>

  <div class="divider">or</div>

  <div class="footer-link">
    Don't have an account? <a href="register.html">Create account</a>
  </div>
</div>

<script>
async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submit-btn');

  if (!email || !password) { showMsg('Please fill in all fields.', 'error'); return; }

  btn.classList.add('loading'); btn.disabled = true;
  document.getElementById('msg-box').style.display = 'none';

  try {
    const res = await fetch('/api/auth?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (res.status === 403 && (data.needsVerification || data.pendingVerification)) {
      const enc = encodeURIComponent(data.email || email.toLowerCase().trim());
      const emailSent = data.emailSent !== false;
      showMsg(
        `⚠ Your email is not verified. <a href="verify-otp.html?email=${enc}&action=register&emailSent=${emailSent}" style="color:var(--accent2);font-weight:600">Verify now →</a>`,
        'error'
      );
      return;
    }

    if (!res.ok) { showMsg(data.error || 'Login failed.', 'error'); return; }

    localStorage.setItem('ragToken', data.token);
    localStorage.setItem('ragUser', JSON.stringify(data.user));
    showMsg('Login successful! Redirecting…', 'success');
    setTimeout(() => window.location.href = 'app.html', 800);
  } catch (err) {
    showMsg('Network error. Please try again.', 'error');
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}
</script>
</body>
</html>
